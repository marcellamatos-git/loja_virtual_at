<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gamers</title>

    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <header>
        <div class="logo">🎮 Gamers</div>

        <nav>
            <ul>
                <li> <a href="../index.html">Inicio</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="login.html" class="ativo">Login</a></li>
                <li><a href="carrinho.html"><img src="../imagens/carrinho.png" alt="carrinho"></a></li>
                
            </ul>
        </nav>
    </header>

    <main class="container">

        <section class="login">

            <h1>Login</h1>
            <p>Entre na sua conta para continuar.</p>

            <form>

                <label for="email">E-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required
                >

                <label for="senha">Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >

                <button type="submit">Entrar</button>

            </form>

            <div class="links">
                <a href="#">Esqueceu a senha?</a>
                <a href="cadastro.html">Criar uma conta</a>
            </div>

        </section>

    </main>

</body>
</html>
